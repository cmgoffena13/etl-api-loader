default_install_hook_types:
  - pre-commit
  - pre-push

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff-check
        entry: uv run -- ruff check --fix
        language: system
        types: [python]
        pass_filenames: true
      - id: ruff-format
        name: ruff-format
        entry: uv run -- ruff format
        language: system
        types: [python]
        pass_filenames: true
      - id: ty-check
        name: ty-check
        entry: uv run -- ty check
        language: system
        types: [python]
        pass_filenames: true

  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: uv run -- pytest -v -n auto
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
        files: ^src/.*\.py$